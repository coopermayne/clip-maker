name: Build Windows EXE

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyinstaller windnd customtkinter

      - name: Download ffmpeg
        run: |
          curl -L -o ffmpeg.zip https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip
          7z x ffmpeg.zip -offmpeg_extract
          Get-ChildItem -Recurse -Filter ffmpeg.exe -Path ffmpeg_extract | Copy-Item -Destination .
          Get-ChildItem -Recurse -Filter ffprobe.exe -Path ffmpeg_extract | Copy-Item -Destination .
        shell: pwsh

      - name: Get customtkinter path
        id: ctk
        run: |
          $ctkPath = python -c "import customtkinter; import os; print(os.path.dirname(customtkinter.__file__))"
          echo "path=$ctkPath" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Build EXE
        run: >
          pyinstaller --onefile --windowed
          --hidden-import windnd
          --add-binary "ffmpeg.exe;."
          --add-binary "ffprobe.exe;."
          --add-data "${{ steps.ctk.outputs.path }};customtkinter/"
          --add-data "icon.ico;."
          --icon "icon.ico"
          --name "CopClipper"
          clip_maker.py

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: CopClipper
          path: dist/CopClipper.exe

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
        shell: bash

      - name: Delete existing latest release
        run: gh release delete latest --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release with EXE
        run: |
          gh release create latest dist/CopClipper.exe --title "v2.0 (${{ steps.sha.outputs.short }})" --notes "v2.0 — Modern UI with CustomTkinter. Built from ${{ github.sha }}" --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
